<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Carousel</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.carousel{
    width:900px;
    max-width:95%;
    position:relative;
}

.carousel img{
    width:100%;
    height:500px;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,.5);
    color:white;
    border:none;
    font-size:30px;
    padding:12px 18px;
    cursor:pointer;
    border-radius:50%;
}

.prev{left:15px;}
.next{right:15px;}

button:hover{
    background:rgba(255,255,255,.25);
}
</style>

</head>

<body>

<div class="carousel">

<img id="photo" src="https://picsum.photos/id/1015/1200/700">

<button class="prev" onclick="previous()">❮</button>
<button class="next" onclick="next()">❯</button>

</div>

<script>

const images=[
"https://picsum.photos/id/1015/1200/700",
"https://picsum.photos/id/1025/1200/700",
"https://picsum.photos/id/1043/1200/700",
"https://picsum.photos/id/1069/1200/700",
"https://picsum.photos/id/1074/1200/700"
];

let current=0;

function show(){
document.getElementById("photo").src=images[current];
}

function next(){
current++;
if(current>=images.length) current=0;
show();
}

function previous(){
current--;
if(current<0) current=images.length-1;
show();
}
    

</script>

</body>
</html>
