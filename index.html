<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Carousel</title>

<style>
html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

.carousel {
    position: relative;
    width: 100%;
    height: 80vh;
    min-height: 650px;
    max-height: 900px;
    overflow: hidden;
    background: #111;
}

/* Blurred image filling the entire background */
.background-image {
    position: absolute;
    inset: -30px;
    width: calc(100% + 60px);
    height: calc(100% + 60px);
    object-fit: cover;
    filter: blur(25px) brightness(0.55);
    transform: scale(1.08);
    opacity: 0.72;
    transition: opacity 0.6s ease;
}

/* Dark overlay improves contrast */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.18);
}

/* Main photo */
.main-image {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 1;
    transition: opacity 0.55s ease;
}

/* Fade state used during slide changes */
.carousel.changing .main-image,
.carousel.changing .background-image {
    opacity: 0;
}

button {
    position: absolute;
    z-index: 4;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    color: white;
    font-size: 25px;
    line-height: 44px;
    cursor: pointer;
    opacity: 0.75;
    transition:
        opacity 0.2s ease,
        background 0.2s ease;
}

button:hover {
    opacity: 1;
    background: rgba(0, 0, 0, 0.72);
}

.prev {
    left: 18px;
}

.next {
    right: 18px;
}

.dots {
    position: absolute;
    z-index: 4;
    left: 0;
    right: 0;
    bottom: 18px;
    display: flex;
    justify-content: center;
    gap: 8px;
}

.dot {
    position: static;
    transform: none;
    width: 9px;
    height: 9px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    cursor: pointer;
}

.dot.active {
    background: white;
    transform: scale(1.2);
}

@media (max-width: 600px) {
    .carousel {
        height: 75vh;
        min-height: 500px;
        max-height: 800px;
    }

    button {
        width: 40px;
        height: 40px;
        font-size: 22px;
        line-height: 40px;
    }

    .prev {
        left: 10px;
    }

    .next {
        right: 10px;
    }

    .dots {
        bottom: 12px;
        gap: 6px;
    }

    .dot {
        width: 8px;
        height: 8px;
    }
}
</style>
</head>

<body>

<div class="carousel" id="carousel">

    <img
        class="background-image"
        id="backgroundImage"
        src="images/photo1.jpg"
        alt=""
        aria-hidden="true"
    >

    <div class="overlay"></div>

    <img
        class="main-image"
        id="mainImage"
        src="images/photo1.jpg"
        alt="Restaurant food photo"
    >

    <button class="prev" id="previousButton" aria-label="Previous photo">❮</button>
    <button class="next" id="nextButton" aria-label="Next photo">❯</button>

    <div class="dots" id="dots"></div>

</div>

<script>
const images = [
    "images/photo1.jpg",
    "images/photo2.jpg",
    "images/photo3.jpg",
    "images/photo4.jpg",
    "images/photo5.jpg",
    "images/photo6.jpg",
    "images/photo7.jpg",
    "images/photo8.jpg",
    "images/photo9.webp",
    "images/photo10.jpg.webp",
    "images/photo11.jpg",
    "images/photo12.jpg",
    "images/photo13.jpg",
    "images/photo14.jpg",
    "images/photo15.jpg",
    "images/photo16.jpg"
];

const carousel = document.getElementById("carousel");
const mainImage = document.getElementById("mainImage");
const backgroundImage = document.getElementById("backgroundImage");
const previousButton = document.getElementById("previousButton");
const nextButton = document.getElementById("nextButton");
const dotsContainer = document.getElementById("dots");

let current = 0;
let autoplayTimer;
let touchStartX = 0;

function preloadImages() {
    images.forEach((imagePath) => {
        const image = new Image();
        image.src = imagePath;
    });
}

function createDots() {
    dotsContainer.innerHTML = "";

    images.forEach((imagePath, index) => {
        const dot = document.createElement("button");

        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `Show photo ${index + 1}`);

        if (index === current) {
            dot.classList.add("active");
        }

        dot.addEventListener("click", () => {
            changeSlide(index);
            restartAutoplay();
        });

        dotsContainer.appendChild(dot);
    });
}

function changeSlide(newIndex) {
    carousel.classList.add("changing");

    window.setTimeout(() => {
        current = newIndex;
        mainImage.src = images[current];
        backgroundImage.src = images[current];
        createDots();

        window.setTimeout(() => {
            carousel.classList.remove("changing");
        }, 60);
    }, 300);
}

function nextSlide() {
    const newIndex = (current + 1) % images.length;
    changeSlide(newIndex);
}

function previousSlide() {
    const newIndex = (current - 1 + images.length) % images.length;
    changeSlide(newIndex);
}

function startAutoplay() {
    stopAutoplay();
    autoplayTimer = window.setInterval(nextSlide, 5000);
}

function stopAutoplay() {
    window.clearInterval(autoplayTimer);
}

function restartAutoplay() {
    startAutoplay();
}

nextButton.addEventListener("click", () => {
    nextSlide();
    restartAutoplay();
});

previousButton.addEventListener("click", () => {
    previousSlide();
    restartAutoplay();
});

carousel.addEventListener("mouseenter", stopAutoplay);
carousel.addEventListener("mouseleave", startAutoplay);

document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowRight") {
        nextSlide();
        restartAutoplay();
    }

    if (event.key === "ArrowLeft") {
        previousSlide();
        restartAutoplay();
    }
});

carousel.addEventListener(
    "touchstart",
    (event) => {
        touchStartX = event.changedTouches[0].screenX;
    },
    { passive: true }
);

carousel.addEventListener(
    "touchend",
    (event) => {
        const touchEndX = event.changedTouches[0].screenX;
        const difference = touchStartX - touchEndX;

        if (Math.abs(difference) < 50) {
            return;
        }

        if (difference > 0) {
            nextSlide();
        } else {
            previousSlide();
        }

        restartAutoplay();
    },
    { passive: true }
);

preloadImages();
createDots();
startAutoplay();
</script>

</body>
</html>
