<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Carousel</title>

<style>
html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.carousel {
    width: min(95vw, 1600px);
    position: relative;
    overflow: hidden;
    border-radius: 18px;
}

.carousel img {
    display: block;
    width: 100%;
    height: min(80vh, 900px);
    object-fit: contain;
    background: #111;
    border-radius: 18px;
}

button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,.55);
    color: white;
    border: none;
    font-size: 28px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 50%;
}

.prev {
    left: 15px;
}

.next {
    right: 15px;
}

button:hover {
    background: rgba(0,0,0,.8);
}

.dots {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 14px;
    display: flex;
    justify-content: center;
    gap: 8px;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,.55);
}

.dot.active {
    background: white;
}

@media (max-width:600px){
    .carousel img{
        height:320px;
    }

    button{
        font-size:22px;
        padding:8px 12px;
    }
}
</style>
</head>

<body>

<div class="carousel">

<img id="photo"
src="images/Salmon-Crudo-2-1024x1536.jpg"
alt="Carousel photo">

<button class="prev" onclick="previousSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

<div class="dots" id="dots"></div>

</div>

<script>

const images = [
    "images/Salmon-Crudo-2-1024x1536.jpg",
    "images/Screenshot_20240814_112553_Pinterest.jpg",
    "images/Skillet-Grilled-Seafood-and-Chorizo-Paella-1.jpg",
    "images/TraditionalCarnitas03.jpg",
    "images/Vegan-tempeh-gyros9-1024x1536.jpg"
];

let current = 0;

const photo = document.getElementById("photo");
const dotsContainer = document.getElementById("dots");

function createDots(){

    dotsContainer.innerHTML="";

    images.forEach((image,index)=>{

        const dot=document.createElement("span");
        dot.className="dot";

        if(index===current){
            dot.classList.add("active");
        }

        dotsContainer.appendChild(dot);

    });

}

function showSlide(){

    photo.src=images[current];
    createDots();

}

function nextSlide(){

    current=(current+1)%images.length;
    showSlide();

}

function previousSlide(){

    current=(current-1+images.length)%images.length;
    showSlide();

}

showSlide();

</script>

</body>
</html>
